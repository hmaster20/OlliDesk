version: "1.0.0"
schema_version: "v1"

default_model: "qwen2.5-coder:7b"
embed_model: "nomic-embed-text"

models:
  - name: "Qwen 2.5 Coder 7B"
    provider: "ollama"
    model: "qwen2.5-coder:7b"
    api_base: "http://localhost:11434"
    roles:
      - "chat"
      - "apply"
    capabilities:
      - "tool_use"
    temperature: 0.7
    max_tokens: 2048
    context_length: 8192
    keep_alive: 1800

  - name: "Nomic Embed Text"
    provider: "ollama"
    model: "nomic-embed-text"
    api_base: "http://localhost:11434"
    roles:
      - "embed"
    context_length: 8192

tool_policies:
  write_file: "ask_first"
  web_search: "ask_first"
  read_file: "auto"
  search_codebase: "auto"

ignored_patterns:
  - ".git"
  - "node_modules"
  - "__pycache__"
  - "venv"
  - ".venv"
  - "dist"
  - "build"
  - ".env"
  - "*.pyc"

index_extensions:
  - ".py"
  - ".js"
  - ".ts"
  - ".tsx"
  - ".jsx"
  - ".html"
  - ".css"
  - ".md"
  - ".json"
  - ".yaml"
  - ".yml"

max_file_size_kb: 100
chunk_size_tokens: 512
chunk_overlap_tokens: 50
rules_file: ".ollidesk/rules.md"
