[project]
name = "ollidesk"
version = "0.1.0"
description = "Local AI coding assistant for Windows 10"
requires-python = ">=3.11"
dependencies = [
    "PySide6>=6.7,<6.8",
    "pydantic>=2.9,<2.10",
    "pydantic-settings>=2.5,<2.6",
    "PyYAML>=6.0,<6.1",
    "loguru>=0.7,<0.8",
    "httpx>=0.27,<0.28",
    "chromadb>=0.5,<0.6",
    "sentence-transformers>=3.0,<3.1",
    "tokenizers>=0.20,<0.21",
    "duckduckgo-search>=6.2,<6.3",
    "rapidocr-onnxruntime>=1.4,<1.5",
    "GitPython>=3.1,<3.2",
    "pathspec>=0.12,<0.13",
    "watchdog>=5.0,<5.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.9",
    "black>=24.0",
    "isort>=5.13",
]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "PT", "RET", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=ollidesk --cov-report=term-missing"
