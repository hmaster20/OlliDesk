<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OlliDesk Editor</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
        }
        #container {
            width: 100%;
            height: 100%;
        }
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 24px;
            background-color: #007acc;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            padding: 0 10px;
            line-height: 24px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="status-bar"></div>

    <script src="vendor/monaco/min/vs/loader.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="editor.js"></script>

    <script>
        window.addEventListener('load', () => {
            initEditor();
        });
    </script>
</body>
</html>
